name: Release

# Builds Opiter for Linux / Windows / macOS via PyInstaller and attaches
# the artifacts to a GitHub Release.
#
# - On a tag push matching `v*` the release is created (or updated)
#   automatically and all three platform builds are uploaded.
# - On `workflow_dispatch` you can also trigger the matrix manually
#   (e.g. to retry one platform); artifacts are uploaded as workflow
#   artifacts but not attached to a release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed to create releases

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
            asset_name: opiter-linux-x86_64.tar.gz
          - os: windows-latest
            platform: windows-x86_64
            asset_name: opiter-windows-x86_64.zip
          - os: macos-latest
            platform: macos-arm64
            asset_name: opiter-macos-arm64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-groups

      # Linux GUI build needs Qt's xcb plugins linked at runtime.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0 \
            libegl1 libdbus-1-3

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconfirm opiter.spec

      - name: Package — Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          tar -czvf ../${{ matrix.asset_name }} opiter

      - name: Package — Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\opiter.exe -DestinationPath ${{ matrix.asset_name }}

      - name: Package — macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd dist
          # Prefer the .app bundle if PyInstaller produced one.
          if [ -d "Opiter.app" ]; then
            zip -r ../${{ matrix.asset_name }} Opiter.app
          else
            zip -r ../${{ matrix.asset_name }} opiter
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f -ls

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
