name: Release

# Builds Opiter for Linux / Windows / macOS via PyInstaller and attaches
# the artifacts to a GitHub Release.
#
# - On a tag push matching `v*` the release is created (or updated)
#   automatically and all three platform builds are uploaded.
# - On `workflow_dispatch` you can also trigger the matrix manually
#   (e.g. to retry one platform); artifacts are uploaded as workflow
#   artifacts but not attached to a release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed to create releases

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
            asset_name: opiter-linux-amd64.deb
          - os: windows-latest
            platform: windows-x86_64
            asset_name: opiter-windows-x86_64.exe
          - os: macos-latest
            platform: macos-arm64
            asset_name: opiter-macos-arm64.dmg
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-groups

      # Linux GUI build needs Qt's xcb plugins linked at runtime.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0 \
            libegl1 libdbus-1-3

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconfirm opiter.spec

      - name: Package — Linux (.deb)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          ROOT=pkg
          mkdir -p $ROOT/DEBIAN \
                   $ROOT/usr/bin \
                   $ROOT/usr/share/applications \
                   $ROOT/usr/share/doc/opiter
          cp dist/opiter $ROOT/usr/bin/opiter
          chmod 755 $ROOT/usr/bin/opiter
          cp LICENSE $ROOT/usr/share/doc/opiter/copyright
          cat > $ROOT/usr/share/applications/opiter.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Opiter
          GenericName=Document Workbench
          Comment=Edit PDFs, view DOCX and HWP, convert between formats
          Exec=/usr/bin/opiter %f
          Terminal=false
          Categories=Office;Graphics;Viewer;
          MimeType=application/pdf;application/vnd.openxmlformats-officedocument.wordprocessingml.document;application/x-hwp;
          EOF
          INSTALLED_KB=$(du -sk $ROOT/usr | cut -f1)
          cat > $ROOT/DEBIAN/control <<EOF
          Package: opiter
          Version: ${VERSION}
          Section: graphics
          Priority: optional
          Architecture: amd64
          Installed-Size: ${INSTALLED_KB}
          Depends: libxcb-cursor0, libxcb-icccm4, libxcb-image0, libxcb-keysyms1, libxcb-randr0, libxcb-render-util0, libxcb-shape0, libxcb-xkb1, libxkbcommon-x11-0, libegl1
          Maintainer: juhyeonl <xx.juon@gmail.com>
          Homepage: https://github.com/juhyeonl-hub/opiter
          Description: Free desktop document workbench
           Edit PDFs, view DOCX and HWP files, and convert between formats
           — all locally with no ads, subscriptions, or cloud uploads.
          EOF
          dpkg-deb --build --root-owner-group $ROOT ${{ matrix.asset_name }}

      - name: Package — Windows (.exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item dist\opiter.exe ${{ matrix.asset_name }}

      - name: Package — macOS (.dmg)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          # hdiutil ships with macOS — produces a compressed .dmg from
          # the .app bundle PyInstaller built.
          hdiutil create \
            -volname "Opiter" \
            -srcfolder dist/Opiter.app \
            -ov -format UDZO \
            ${{ matrix.asset_name }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f -ls

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
